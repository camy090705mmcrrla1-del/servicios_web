<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Servicios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <a href="/menu" class="btn btn-secondary">
        Menú
    </a>

    <h2 class="mt-3">
        CRUD Servicios
    </h2>

    <div class="card p-3">

        {% if editar %}
        <form method="POST" action="/servicios/editar/{{editar[0]}}">
        {% else %}
        <form method="POST">
        {% endif %}

            <input
                type="text"
                name="nombre"
                class="form-control mb-2"
                placeholder="Nombre"
                value="{{ editar[1] if editar else '' }}"
                required
            >

            <input
                type="number"
                step="0.01"
                name="precio"
                class="form-control mb-2"
                placeholder="Precio"
                value="{{ editar[2] if editar else '' }}"
                required
            >

            <input
                type="text"
                name="periodo"
                class="form-control mb-2"
                placeholder="Periodo"
                value="{{ editar[3] if editar else 'bimestral' }}"
                required
            >

            <input
                type="text"
                name="type"
                class="form-control mb-2"
                placeholder="Tipo"
                value="{{ editar[4] if editar else '' }}"
                required
            >

            <button class="btn btn-primary">

                {% if editar %}
                    Actualizar
                {% else %}
                    Guardar
                {% endif %}

            </button>

        </form>

    </div>

    <br>

    <table class="table table-bordered">

        <tr>

            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Periodo</th>
            <th>Tipo</th>
            <th>Acciones</th>

        </tr>

        {% for s in servicios %}

        <tr>

            <td>{{s[0]}}</td>
            <td>{{s[1]}}</td>
            <td>${{s[2]}}</td>
            <td>{{s[3]}}</td>
            <td>{{s[4]}}</td>

            <td>

                <a href="/servicios/editar/{{s[0]}}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a href="/servicios/eliminar/{{s[0]}}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
