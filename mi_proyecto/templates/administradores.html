<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Administradores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <a href="/menu"
       class="btn btn-secondary">
       Menú
    </a>

    <h2 class="mt-3">
         Administradores
    </h2>

    <div class="card p-3">

        {% if editar %}

        <form method="POST"
              action="/administradores/editar/{{editar[0]}}">

        {% else %}

        <form method="POST">

        {% endif %}

            <input
                type="text"
                name="nombre"
                class="form-control mb-2"
                placeholder="Nombre"
                value="{{ editar[1] if editar else '' }}"
                required
            >

            <input
                type="text"
                name="password"
                class="form-control mb-2"
                placeholder="Contraseña"
                value="{{ editar[2] if editar else '' }}"
                required
            >

            <input
                type="number"
                name="edad"
                class="form-control mb-2"
                placeholder="Edad"
                value="{{ editar[3] if editar else '' }}"
                required
            >

            <input
                type="text"
                name="puesto"
                class="form-control mb-2"
                placeholder="Puesto"
                value="{{ editar[4] if editar else '' }}"
                required
            >

            <button class="btn btn-primary">

                {% if editar %}
                    Actualizar
                {% else %}
                    Guardar
                {% endif %}

            </button>

        </form>

    </div>

    <br>

    <table class="table table-bordered">

        <tr>

            <th>ID</th>
            <th>Nombre</th>
            <th>Password</th>
            <th>Edad</th>
            <th>Puesto</th>
            <th>Acciones</th>

        </tr>

        {% for a in administradores %}

        <tr>

            <td>{{a[0]}}</td>
            <td>{{a[1]}}</td>
            <td>{{a[2]}}</td>
            <td>{{a[3]}}</td>
            <td>{{a[4]}}</td>

            <td>

                <a href="/administradores/editar/{{a[0]}}"
                   class="btn btn-warning btn-sm">

                    Editar

                </a>

                <a href="/administradores/eliminar/{{a[0]}}"
                   class="btn btn-danger btn-sm">

                    Eliminar

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
