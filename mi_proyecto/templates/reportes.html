<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reportes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <a href="/menu" class="btn btn-secondary">
        Menú
    </a>

    <h2 class="mt-3">
        CRUD Reportes
    </h2>

    <div class="card p-3">

        {% if editar %}
        <form method="POST" action="/reportes/editar/{{editar[0]}}">
        {% else %}
        <form method="POST">
        {% endif %}

            <label>Usuario</label>

            <select
                name="usuario"
                class="form-control mb-2"
                required>

                {% for u in usuarios %}

                <option value="{{u[0]}}">
                    {{u[1]}}
                </option>

                {% endfor %}

            </select>

            <label>Servicio</label>

            <select
                name="servicio"
                class="form-control mb-2"
                required>

                {% for s in servicios %}

                <option value="{{s[0]}}">
                    {{s[1]}}
                </option>

                {% endfor %}

            </select>

            <input
                type="text"
                name="direccion"
                class="form-control mb-2"
                placeholder="Dirección"
                value="{{ editar[3] if editar else '' }}"
                required
            >

            <input
                type="text"
                name="urgencia"
                class="form-control mb-2"
                placeholder="Urgencia"
                value="{{ editar[4] if editar else '' }}"
                required
            >

            <textarea
                name="descripcion"
                class="form-control mb-2"
                placeholder="Descripción"
                required>{{ editar[5] if editar else '' }}</textarea>

            <button class="btn btn-info">

                {% if editar %}
                    Actualizar
                {% else %}
                    Guardar
                {% endif %}

            </button>

        </form>

    </div>

    <br>

    <table class="table table-bordered">

        <tr>

            <th>ID</th>
            <th>Usuario</th>
            <th>Servicio</th>
            <th>Dirección</th>
            <th>Urgencia</th>
            <th>Descripción</th>
            <th>Acciones</th>

        </tr>

        {% for r in reportes %}

        <tr>

            <td>{{r[0]}}</td>
            <td>{{r[1]}}</td>
            <td>{{r[2]}}</td>
            <td>{{r[3]}}</td>
            <td>{{r[4]}}</td>
            <td>{{r[5]}}</td>

            <td>

                <a href="/reportes/editar/{{r[0]}}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a href="/reportes/eliminar/{{r[0]}}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
