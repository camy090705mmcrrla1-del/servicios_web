<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Usuarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <a href="/menu" class="btn btn-secondary">
        Menú
    </a>

    <h2 class="mt-3">
        CRUD Usuarios
    </h2>

    <div class="card p-3">

        {% if editar %}
        <form method="POST" action="/usuarios/editar/{{editar[0]}}">
        {% else %}
        <form method="POST">
        {% endif %}

            <input
                type="text"
                name="nombre"
                class="form-control mb-2"
                placeholder="Nombre"
                value="{{ editar[1] if editar else '' }}"
                required
            >

            <input
                type="text"
                name="password"
                class="form-control mb-2"
                placeholder="Contraseña"
                value="{{ editar[2] if editar else '' }}"
                required
            >

            <input
                type="number"
                name="edad"
                class="form-control mb-2"
                placeholder="Edad"
                value="{{ editar[3] if editar else '' }}"
                required
            >

            <input
                type="text"
                name="telefono"
                class="form-control mb-2"
                placeholder="Teléfono"
                value="{{ editar[4] if editar else '' }}"
                required
            >

            <button class="btn btn-success">
                {% if editar %}
                    Actualizar
                {% else %}
                    Guardar
                {% endif %}
            </button>

        </form>

    </div>

    <br>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Password</th>
            <th>Edad</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>

        {% for u in usuarios %}

        <tr>

            <td>{{u[0]}}</td>
            <td>{{u[1]}}</td>
            <td>{{u[2]}}</td>
            <td>{{u[3]}}</td>
            <td>{{u[4]}}</td>

            <td>

                <a href="/usuarios/editar/{{u[0]}}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a href="/usuarios/eliminar/{{u[0]}}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
